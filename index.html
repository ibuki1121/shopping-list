<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藤原家の買い物リスト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>藤原家の買い物リスト</h1>
    <p id="status">待機中...</p>

    <div class="controls">
        <button id="start-btn">録音開始 🎤</button>
        <button id="stop-btn" disabled>録音終了 ⏹️</button>
    </div>

    <div class="list-card">
        <div id="shopping-list">
            </div>
        <button id="delete-btn">チェックした項目を削除</button>
    </div>

    <script type="module">
        // 1. Firebase SDKのインポート
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 2. Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyApNpg5fm9Myw_8nnZbkWMiM-QqPmjlCzs",
            authDomain: "my-shopping-list-da188.firebaseapp.com",
            projectId: "my-shopping-list-da188",
            storageBucket: "my-shopping-list-da188.firebasestorage.app",
            messagingSenderId: "526665051615",
            appId: "1:526665051615:web:9e25c53ad5413fe9e6e86a",
            measurementId: "G-FWB9BKBJ4C",
            databaseURL: "https://my-shopping-list-da188-default-rtdb.firebaseio.com"
        };

        // 3. 初期化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'shoppingList');

        // --- DOM要素の取得 ---
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const deleteBtn = document.getElementById('delete-btn');
        const listContainer = document.getElementById('shopping-list');
        const statusText = document.getElementById('status');

        // --- 音声認識の設定 ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            statusText.innerText = "音声認識非対応のブラウザです";
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.continuous = false;      // スマホ安定のためfalse
        recognition.interimResults = false; // 確定結果のみ

        // 音声認識：結果取得時
        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript.trim();
            if (text) {
                // 「と」や「、」で分割して保存
                const items = text.split(/と|、| |・/);
                items.forEach(item => {
                    const trimmed = item.trim();
                    if (trimmed) {
                        push(dbRef, { text: trimmed, checked: false });
                    }
                });
                statusText.innerText = "追加しました: " + text;
                statusText.style.color = "#28a745";
            }
        };

        // 音声認識：エラー時
        recognition.onerror = (event) => {
            console.error("Speech Recognition Error:", event.error);
            if (event.error === 'not-allowed') {
                statusText.innerText = "マイクの使用が許可されていません";
            } else {
                statusText.innerText = "エラー: " + event.error;
            }
            updateButtonState(false);
        };

        // 音声認識：終了時
        recognition.onend = () => {
            console.log("Recognition ended.");
            updateButtonState(false);
            if (!statusText.innerText.includes("追加しました")) {
                statusText.innerText = "待機中...";
                statusText.style.color = "#555";
            }
        };

        // ボタンの表示切り替え関数
        function updateButtonState(isRecording) {
            startBtn.disabled = isRecording;
            stopBtn.disabled = !isRecording;
        }

        // 録音開始（手動ボタン）
        startBtn.onclick = () => {
            try {
                recognition.start();
                updateButtonState(true);
                statusText.innerText = "録音中... はっきりお話しください";
                statusText.style.color = "#dc3545";
            } catch (e) {
                console.error(e);
            }
        };

        // 録音終了（手動ボタン）
        stopBtn.onclick = () => {
            recognition.stop();
            updateButtonState(false);
            statusText.innerText = "認識中...";
        };

        // --- Firebase 連携（リアルタイム同期） ---

        // データ追加を検知
        onChildAdded(dbRef, (data) => {
            addItemToDOM(data.val().text, data.key);
        });

        // データ削除を検知
        onChildRemoved(dbRef, (data) => {
            const element = document.getElementById(data.key);
            if (element) element.remove();
        });

        // リストを画面に描画
        function addItemToDOM(text, key) {
            const div = document.createElement('div');
            div.className = 'shopping-item';
            div.id = key;
            div.innerHTML = `
                <label style="display: flex; align-items: center; width: 100%;">
                    <input type="checkbox" class="item-check">
                    <span class="item-text" style="margin-left: 10px;">${text}</span>
                </label>
            `;
            listContainer.appendChild(div);

            const checkbox = div.querySelector('.item-check');
            const span = div.querySelector('.item-text');
            checkbox.onchange = () => {
                span.classList.toggle('completed', checkbox.checked);
            };
        }

        // 削除ボタン：チェック済みをFirebaseから消す
        deleteBtn.onclick = () => {
            const checkedBoxes = document.querySelectorAll('.item-check:checked');
            checkedBoxes.forEach(cb => {
                const key = cb.closest('.shopping-item').id;
                const itemRef = ref(db, `shoppingList/${key}`);
                remove(itemRef);
            });
            statusText.innerText = "削除しました";
        };
