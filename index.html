<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声入力買い物リスト</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <h1>藤原家の買い物リスト</h1>
    <p id="status">待機中...</p>

    <div class="controls">
        <button id="start-btn">録音開始 🎤</button>
        <button id="stop-btn" disabled>録音終了 ⏹️</button>
    </div>

    <div class="list-card">
        <div id="shopping-list">
            </div>
        <button id="delete-btn">チェックした項目を削除</button>
    </div>

</body>
</html>
