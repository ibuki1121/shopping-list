<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藤原家の買い物リスト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>藤原家の買い物リスト</h1>
    <p id="status">接続を確認中...</p>

    <div class="controls">
        <button id="start-btn">録音開始 🎤</button>
        <button id="stop-btn" disabled>録音終了 ⏹️</button>
    </div>

    <div class="list-card">
        <div id="shopping-list">
            </div>
        <button id="delete-btn">チェックした項目を削除</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved, onChildChanged, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApNpg5fm9Myw_8nnZbkWMiM-QqPmjlCzs",
            authDomain: "my-shopping-list-da188.firebaseapp.com",
            projectId: "my-shopping-list-da188",
            storageBucket: "my-shopping-list-da188.firebasestorage.app",
            messagingSenderId: "526665051615",
            appId: "1:526665051615:web:9e25c53ad5413fe9e6e86a",
            measurementId: "G-FWB9BKBJ4C",
            databaseURL: "https://my-shopping-list-da188-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'shoppingList');

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const deleteBtn = document.getElementById('delete-btn');
        const listContainer = document.getElementById('shopping-list');
        const statusText = document.getElementById('status');

        onValue(dbRef, () => {
            statusText.innerText = "接続完了：待機中...";
            statusText.style.color = "#28a745";
        });

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript.trim();
            if (text) {
                const items = text.split(/と|、| |・/);
                items.forEach(item => {
                    const trimmed = item.trim();
                    if (trimmed) {
                        push(dbRef, { text: trimmed, checked: false });
                    }
                });
                statusText.innerText = "追加しました: " + text;
            }
        };

        recognition.onerror = (e) => {
            statusText.innerText = "エラー: " + e.error;
            startBtn.disabled = false;
            stopBtn.disabled = true;
        };

        recognition.onend = () => {
            startBtn.disabled = false;
            stopBtn.disabled = true;
            if (!statusText.innerText.includes("追加しました")) {
                statusText.innerText = "待機中...";
            }
        };

        startBtn.onclick = () => {
            recognition.start();
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusText.innerText = "録音中...";
            statusText.style.color = "#dc3545";
        };

        stopBtn.onclick = () => {
            recognition.stop();
        };

        onChildAdded(dbRef, (data) => {
            addItemToDOM(data.val().text, data.key);
        });

        onChildRemoved(dbRef, (data) => {
            const element = document.getElementById(data.key);
            if (element) element.remove();
        });

        onChildChanged(dbRef, (data) => {
            const key = data.key;
            const updatedText = data.val().text;
            const element = document.getElementById(key);
            if (element) {
                element.querySelector('.item-text').innerText = updatedText;
            }
        });

        function addItemToDOM(text, key) {
            const div = document.createElement('div');
            div.className = 'shopping-item';
            div.id = key;
            div.innerHTML = `
                <label class="item-label">
                    <input type="checkbox" class="item-check">
                    <span class="item-text">${text}</span>
                </label>
                <button class="edit-btn">✏️</button>
            `;
            listContainer.appendChild(div);

            const checkbox = div.querySelector('.item-check');
            const span = div.querySelector('.item-text');
            const editBtn = div.querySelector('.edit-btn');

            checkbox.onchange = () => {
                span.classList.toggle('completed', checkbox.checked);
            };

            editBtn.onclick = () => {
                const currentText = span.innerText;
                const newText = prompt("内容を編集してください", currentText);
                if (newText !== null && newText.trim() !== "" && newText !== currentText) {
                    const itemRef = ref(db, `shoppingList/${key}`);
                    update(itemRef, { text: newText.trim() });
                }
            };
        }

        deleteBtn.onclick = () => {
            const checkedBoxes = document.querySelectorAll('.item-check:checked');
            checkedBoxes.forEach(cb => {
                const key = cb.closest('.shopping-item').id;
                remove(ref(db, `shoppingList/${key}`));
            });
            statusText.innerText = "チェックした項目を削除しました";
        };
    </script>
</body>
</html>
